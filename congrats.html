<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>It's Official! 🌹</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="media.css">
  <style>
    body {
      background:radial-gradient(ellipse at 50% 35%,#ffd6e4 0%,#ffb3c6 50%,#ff8fa3 100%);
      flex-direction:column; gap:0;
    }

    /* ── Stars canvas ── */
    #stars { position:fixed; inset:0; pointer-events:none; z-index:0; }

    /* ── Card extras ── */
    .congrats-emoji {
      font-size:3.5rem; display:block; margin:8px 0 4px;
      animation:emojiPop .6s cubic-bezier(.2,.8,.3,1) .2s both;
    }
    @keyframes emojiPop { from{transform:scale(0) rotate(-20deg)} to{transform:scale(1) rotate(0deg)} }

    .phase-badge {
      display:inline-block; margin:12px 0;
      background:linear-gradient(135deg,#ff758f,#c9184a);
      color:white; border-radius:50px; padding:8px 20px;
      font-weight:800; font-size:.88rem; letter-spacing:.08em;
      box-shadow:0 4px 0 #9b0e30,0 8px 18px rgba(201,24,74,.35);
      animation:badgeSlide .6s cubic-bezier(.2,.8,.3,1) .4s both;
    }
    @keyframes badgeSlide { from{opacity:0;transform:translateY(12px) scale(.85)} to{opacity:1;transform:none} }

    .promise-list {
      text-align:left; margin:16px 0;
    }
    .promise-item {
      display:flex; align-items:center; gap:10px;
      padding:8px 0; font-size:.9rem; color:#7a2040;
      border-bottom:1px dashed #ffd6e4;
    }
    .promise-item:last-child { border-bottom:none; }

    /* see-again btn */
    .see-btn {
      background:transparent;
      color:var(--rose-dark); border:2px solid var(--rose-light);
      font-weight:700; font-size:.82rem;
      padding:10px 20px; border-radius:50px; cursor:pointer;
      text-decoration:none; font-family:'Nunito',sans-serif;
      transition:all .22s;
    }
    .see-btn:hover { background:var(--rose-dark); color:white; border-color:var(--rose-dark); }

    /* floating hearts */
    .float-heart {
      position:fixed; pointer-events:none; z-index:1;
      animation:heartFloat linear infinite; opacity:0;
    }
    @keyframes heartFloat {
      0%   { transform:translateY(0) scale(1) rotate(0deg);     opacity:0; }
      8%   { opacity:.8; }
      92%  { opacity:.55; }
      100% { transform:translateY(-110vh) scale(.6) rotate(360deg); opacity:0; }
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>
<div id="hearts-container"></div>

<audio id="bgMusic" loop preload="auto">
  <source src="paraluman.mp3" type="audio/mpeg">
</audio>

<div class="card" style="animation-delay:.1s">
  <div class="stamp">✓ Accepted</div>
  <span class="congrats-emoji">🌹</span>
  <h1>Application<br>Accepted!</h1>
  <div class="divider"></div>

  <div class="phase-badge">💌 Courting Phase — Activated</div>

  <div class="promise-list">
    <div class="promise-item"><span>🌹</span><span>You're officially being courted!</span></div>
    <div class="promise-item"><span>💌</span><span>Expect sweet messages every morning.</span></div>
    <div class="promise-item"><span>🎀</span><span>Get ready for infinite spoiled treatment.</span></div>
    <div class="promise-item"><span>✨</span><span>Happiness, laughter &amp; magic — incoming.</span></div>
  </div>

  <p style="font-size:1.6rem;margin:8px 0">🥰 📜 ✨</p>

  <div class="btn-row" style="flex-direction:column;gap:10px;margin-top:20px">
    <a href="ring.html" class="btn btn-yes pulse">See the Ring Again 💍</a>
    <a href="index.html" class="see-btn">← Back to the Start</a>
  </div>
</div>

<script>
/* ── Music restore ── */
const music = document.getElementById('bgMusic');
const savedTime    = localStorage.getItem('musicTime');
const savedPlaying = localStorage.getItem('musicPlaying') === 'true';
if (savedTime !== null && savedPlaying) {
  music.currentTime = parseFloat(savedTime);
  music.volume = 0.6;
  music.play().catch(() => {});
}
window.addEventListener('beforeunload', () => {
  localStorage.setItem('musicTime', music.currentTime);
  localStorage.setItem('musicPlaying', !music.paused);
});

/* ── Floating hearts ── */
const HEARTS = ['❤️','💖','💕','🌸','✨','💝','🌹'];
function spawnHeart() {
  const h = document.createElement('div');
  h.className = 'float-heart';
  h.textContent = HEARTS[Math.floor(Math.random() * HEARTS.length)];
  h.style.left = Math.random() * 100 + 'vw';
  h.style.fontSize = (.8 + Math.random() * .9) + 'rem';
  const dur = 4 + Math.random() * 4;
  h.style.animationDuration = dur + 's';
  h.style.animationDelay = Math.random() * 2 + 's';
  document.getElementById('hearts-container').appendChild(h);
  setTimeout(() => h.remove(), (dur + 3) * 1000);
}
for (let i = 0; i < 20; i++) spawnHeart();
setInterval(spawnHeart, 300);

/* ── Twinkling stars canvas ── */
const cvs = document.getElementById('stars');
const ctx  = cvs.getContext('2d');
cvs.width  = window.innerWidth;
cvs.height = window.innerHeight;
window.addEventListener('resize', () => { cvs.width=innerWidth; cvs.height=innerHeight; });
const stars = Array.from({length:120}, () => ({
  x:Math.random()*innerWidth, y:Math.random()*innerHeight,
  r:.5+Math.random()*1.5, sp:Math.random()*.006+.002, ph:Math.random()*Math.PI*2
}));
function drawStars(t) {
  ctx.clearRect(0,0,cvs.width,cvs.height);
  stars.forEach(s => {
    const a = .3 + .5 * Math.sin(t*s.sp+s.ph);
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle = `rgba(255,255,255,${a})`; ctx.fill();
  });
  requestAnimationFrame(drawStars);
}
requestAnimationFrame(drawStars);
</script>
</body>
</html>
